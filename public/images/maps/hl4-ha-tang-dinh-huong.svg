<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#94a3b8" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Bản đồ định hướng hạ tầng HL4 — Đô thị Hòa Lạc</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#64748b">Sơ đồ vị trí tương đối các phân khu và hạ tầng trọng điểm (không theo tỉ lệ)</text>

  <!-- ============ ROADS ============ -->

  <!-- Cao toc Hoa Lac - Hoa Binh (top) -->
  <line x1="40" y1="95" x2="760" y2="95" stroke="#f97316" stroke-width="4" stroke-dasharray="12,4"/>
  <rect x="230" y="78" width="340" height="20" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="400" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#c2410c">Cao tốc Hòa Lạc — Hòa Bình (120-180m, 6 làn)</text>

  <!-- Quoc lo 21 (right) -->
  <line x1="680" y1="70" x2="680" y2="560" stroke="#f97316" stroke-width="4" stroke-dasharray="12,4"/>
  <rect x="688" y="280" width="18" height="120" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="697" y="320" text-anchor="middle" font-size="9" font-weight="600" fill="#c2410c" transform="rotate(90, 697, 320)">Quốc lộ 21 (80m)</text>

  <!-- Duong Ho Chi Minh (bottom) -->
  <line x1="40" y1="520" x2="760" y2="520" stroke="#f97316" stroke-width="4" stroke-dasharray="12,4"/>
  <rect x="250" y="525" width="300" height="20" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="400" y="539" text-anchor="middle" font-size="10" font-weight="600" fill="#c2410c">Đường Hồ Chí Minh (120m, 6 làn)</text>

  <!-- ============ AREA BLOCKS ============ -->

  <!-- HL3 (left of HL4) -->
  <rect x="60" y="115" x2="200" width="140" height="390" rx="10" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#0369a1">HL3</text>
  <text x="130" y="308" text-anchor="middle" font-size="10" fill="#0c4a6e">1.004 ha</text>
  <text x="130" y="322" text-anchor="middle" font-size="10" fill="#0c4a6e">48.200 người</text>
  <text x="130" y="340" text-anchor="middle" font-size="9" fill="#64748b">Đô thị sinh thái</text>
  <text x="130" y="354" text-anchor="middle" font-size="9" fill="#64748b">+ du lịch</text>

  <!-- HL4 (center, largest) -->
  <rect x="215" y="115" width="450" height="390" rx="12" fill="#fef3c7" stroke="#d44809" stroke-width="2.5" filter="url(#shadow)"/>

  <!-- HL4 label -->
  <text x="440" y="145" text-anchor="middle" font-size="20" font-weight="800" fill="#92400e">HL4</text>
  <text x="440" y="163" text-anchor="middle" font-size="11" fill="#78350f">1.880 ha — 145.000 người — Trung tâm đô thị</text>

  <!-- HL4 internal zones -->

  <!-- HL4-3: Trung tam hanh chinh -->
  <rect x="235" y="180" width="170" height="100" rx="8" fill="url(#hatch)" stroke="#94a3b8" stroke-width="1"/>
  <rect x="235" y="180" width="170" height="100" rx="8" fill="#fefce8" fill-opacity="0.7"/>
  <text x="320" y="220" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">HL4-3</text>
  <text x="320" y="236" text-anchor="middle" font-size="9" fill="#854d0e">Trung tâm hành chính</text>
  <text x="320" y="250" text-anchor="middle" font-size="9" fill="#854d0e">219 ha</text>
  <text x="320" y="264" text-anchor="middle" font-size="8" fill="#a16207">⚠ Yếu tố quốc phòng</text>

  <!-- HL4-4: Y te vung -->
  <rect x="420" y="180" width="150" height="100" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="495" y="210" text-anchor="middle" font-size="18" fill="#166534">+</text>
  <text x="495" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">HL4-4</text>
  <text x="495" y="244" text-anchor="middle" font-size="9" fill="#15803d">Y tế cấp vùng</text>
  <text x="495" y="258" text-anchor="middle" font-size="9" fill="#15803d">120 ha</text>
  <text x="495" y="272" text-anchor="middle" font-size="8" fill="#16a34a">Bệnh viện TW cơ sở 2</text>

  <!-- HL4-5,6: Doi lot xanh -->
  <rect x="235" y="295" width="200" height="80" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="335" y="330" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">HL4-5 &amp; HL4-6</text>
  <text x="335" y="346" text-anchor="middle" font-size="9" fill="#15803d">Đại lộ xanh — 675 ha — 62.500 người</text>
  <text x="335" y="360" text-anchor="middle" font-size="8" fill="#16a34a">Xe buýt nhanh, xe điện mặt đất</text>

  <!-- HL4-7,8: NOXH -->
  <rect x="450" y="295" width="200" height="80" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="550" y="325" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">HL4-7 &amp; HL4-8</text>
  <text x="550" y="341" text-anchor="middle" font-size="9" fill="#6d28d9">Nhà ở xã hội tập trung</text>
  <text x="550" y="357" text-anchor="middle" font-size="9" fill="#6d28d9">157 ha — 50.300 người</text>

  <!-- Loi trung tam -->
  <rect x="330" y="395" width="220" height="55" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="440" y="418" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Lõi trung tâm đô thị</text>
  <text x="440" y="434" text-anchor="middle" font-size="9" fill="#a16207">Tài chính, thương mại, dịch vụ</text>
  <text x="440" y="446" text-anchor="middle" font-size="8" fill="#a16207">Vành đai 1 đô thị Hòa Lạc</text>

  <!-- HL5 (bottom-left of HL4) -->
  <rect x="215" y="460" width="200" height="48" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="315" y="484" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">HL5</text>
  <text x="315" y="498" text-anchor="middle" font-size="9" fill="#64748b">1.110 ha — 75.000 người</text>

  <!-- HL6 (bottom-right of HL4) -->
  <rect x="430" y="460" width="200" height="48" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="530" y="484" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">HL6</text>
  <text x="530" y="498" text-anchor="middle" font-size="9" fill="#64748b">700 ha — 77.000 người</text>

  <!-- ============ METRO LINE ============ -->

  <!-- Metro line 5 (horizontal dashed through HL4) -->
  <line x1="60" y1="160" x2="670" y2="160" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8,5"/>

  <!-- Ga S18 -->
  <circle cx="350" cy="160" r="9" fill="#7c3aed" stroke="#fff" stroke-width="2.5"/>
  <text x="350" y="157" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">S18</text>
  <rect x="310" y="133" width="80" height="16" rx="3" fill="#7c3aed"/>
  <text x="350" y="144" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">Ga Tiến Xuân</text>

  <!-- Ga S19 -->
  <circle cx="570" cy="160" r="9" fill="#7c3aed" stroke="#fff" stroke-width="2.5"/>
  <text x="570" y="157" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">S19</text>
  <rect x="530" y="133" width="80" height="16" rx="3" fill="#7c3aed"/>
  <text x="570" y="144" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">Ga Trại Mới</text>

  <!-- Metro label -->
  <rect x="60" y="118" width="135" height="16" rx="3" fill="#7c3aed" fill-opacity="0.1" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="127" y="130" text-anchor="middle" font-size="8" font-weight="600" fill="#6d28d9">Đường sắt đô thị số 5</text>

  <!-- ============ LEGEND ============ -->
  <rect x="40" y="558" width="720" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Legend items -->
  <line x1="60" y1="577" x2="85" y2="577" stroke="#f97316" stroke-width="3" stroke-dasharray="6,3"/>
  <text x="90" y="581" font-size="10" fill="#475569">Trục giao thông chính</text>

  <line x1="230" y1="577" x2="255" y2="577" stroke="#7c3aed" stroke-width="3" stroke-dasharray="5,3"/>
  <text x="260" y="581" font-size="10" fill="#475569">Đường sắt đô thị số 5</text>

  <circle cx="410" cy="577" r="5" fill="#7c3aed" stroke="#fff" stroke-width="1.5"/>
  <text x="420" y="581" font-size="10" fill="#475569">Ga đường sắt</text>

  <rect x="500" y="572" width="14" height="10" rx="2" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="520" y="581" font-size="10" fill="#475569">Hạ tầng trọng điểm</text>

  <rect x="630" y="572" width="14" height="10" rx="2" fill="url(#hatch)" stroke="#94a3b8" stroke-width="0.5"/>
  <rect x="630" y="572" width="14" height="10" rx="2" fill="#fefce8" fill-opacity="0.5"/>
  <text x="650" y="581" font-size="10" fill="#475569">Quốc phòng</text>

  <text x="400" y="600" text-anchor="middle" font-size="9" fill="#94a3b8">Nguồn: QĐ 5105/QĐ-UBND, QĐ 4602/QĐ-UBND — Sơ đồ minh họa, không theo tỉ lệ thực</text>
</svg>
