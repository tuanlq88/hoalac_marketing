<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4A5568"/>
    </marker>
    <linearGradient id="metroLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" fill="#F7FAFC" rx="8"/>

  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1A202C">Tuyến đường sắt đô thị số 5: Văn Cao — Hòa Lạc (39,6 km)</text>
  <text x="500" y="50" text-anchor="middle" font-size="11" fill="#718096">Nguồn: QĐ 4602/QĐ-UBND | 20 ga | Khởi công 12/2025 | Dự kiến vận hành 2030</text>

  <!-- Area labels background zones -->
  <!-- Noi thanh Ha Noi zone -->
  <rect x="30" y="65" width="340" height="390" rx="6" fill="#EBF4FF" stroke="#BEE3F8" stroke-width="1" opacity="0.5"/>
  <text x="200" y="85" text-anchor="middle" font-size="11" fill="#2B6CB0" font-weight="600">NỘI THÀNH HÀ NỘI</text>
  <text x="200" y="98" text-anchor="middle" font-size="9" fill="#4A90D9">Đoạn ngầm (S1-S6)</text>

  <!-- Vung dem zone -->
  <rect x="375" y="65" width="200" height="390" rx="6" fill="#F0FFF4" stroke="#C6F6D5" stroke-width="1" opacity="0.5"/>
  <text x="475" y="85" text-anchor="middle" font-size="11" fill="#276749" font-weight="600">VÙNG ĐỆM</text>
  <text x="475" y="98" text-anchor="middle" font-size="9" fill="#48BB78">Đoạn mặt đất (S7-S15)</text>

  <!-- Hoa Lac zone -->
  <rect x="580" y="65" width="395" height="390" rx="6" fill="#FFFAF0" stroke="#FEEBC8" stroke-width="1" opacity="0.5"/>
  <text x="777" y="85" text-anchor="middle" font-size="11" fill="#C05621" font-weight="600">ĐÔ THỊ VỆ TINH HÒA LẠC</text>
  <text x="777" y="98" text-anchor="middle" font-size="9" fill="#DD6B20">5 ga tại Hòa Lạc (S16-S20)</text>

  <!-- HL3 sub-zone -->
  <rect x="590" y="110" width="155" height="280" rx="4" fill="#FFF5EB" stroke="#FBD38D" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="667" y="128" text-anchor="middle" font-size="10" fill="#C05621" font-weight="600">HL3</text>
  <text x="667" y="140" text-anchor="middle" font-size="8" fill="#DD6B20">48.200 người</text>

  <!-- HL4 sub-zone -->
  <rect x="750" y="110" width="215" height="280" rx="4" fill="#FFF0E6" stroke="#F6AD55" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="857" y="128" text-anchor="middle" font-size="10" fill="#C05621" font-weight="600">HL4</text>
  <text x="857" y="140" text-anchor="middle" font-size="8" fill="#DD6B20">145.000 người</text>

  <!-- Metro line path -->
  <path d="M 60 250 L 370 250 L 580 250 Q 620 250 660 270 L 750 310 L 850 350 L 950 380"
