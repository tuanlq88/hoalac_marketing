  <circle cx="470" cy="250" r="4" fill="#38A169" stroke="white" stroke-width="1"/>
  <circle cx="490" cy="250" r="4" fill="#38A169" stroke="white" stroke-width="1"/>
  <circle cx="510" cy="250" r="4" fill="#38A169" stroke="white" stroke-width="1"/>
  <circle cx="530" cy="250" r="4" fill="#38A169" stroke="white" stroke-width="1"/>
  <circle cx="550" cy="250" r="4" fill="#38A169" stroke="white" stroke-width="1"/>
  <circle cx="570" cy="250" r="4" fill="#38A169" stroke="white" stroke-width="1"/>

  <text x="520" y="240" text-anchor="middle" font-size="7" fill="#718096">S10—S15</text>

