  <!-- S17 Dong Bai - SPECIAL (elevated, intersection) -->
  <circle cx="750" cy="310" r="11" fill="#C05621" stroke="#FBD38D" stroke-width="3" filter="url(#shadow)"/>
  <text x="750" y="313" text-anchor="middle" font-size="7" fill="white" font-weight="700">S17</text>
  <!-- Highlight circle for intersection -->
  <circle cx="750" cy="310" r="18" fill="none" stroke="#F6AD55" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
  <text x="712" y="345" text-anchor="start" font-size="9" fill="#1A202C" font-weight="700">Ga Đồng Bãi ★</text>
  <text x="712" y="357" text-anchor="start" font-size="7.5" fill="#C05621">Trên cao 3 tầng | Nút giao ĐL Thăng Long × QL21A</text>
  <text x="712" y="368" text-anchor="start" font-size="7.5" fill="#C05621">Tiềm năng trung chuyển đa phương tiện</text>

  <!-- S18 Tien Xuan -->
  <circle cx="850" cy="350" r="11" fill="#C05621" stroke="#FBD38D" stroke-width="3" filter="url(#shadow)"/>
  <text x="850" y="353" text-anchor="middle" font-size="7" fill="white" font-weight="700">S18</text>
  <text x="870" y="335" text-anchor="start" font-size="9" fill="#1A202C" font-weight="700">Ga Tiến Xuân ★</text>
  <text x="870" y="347" text-anchor="start" font-size="7.5" fill="#C05621">Mặt đất | Gắn lõi HL4</text>
  <text x="870" y="358" text-anchor="start" font-size="7.5" fill="#C05621">Cạnh TT Y tế vùng 120 ha</text>

  <!-- S19 Trai Moi -->
  <circle cx="900" cy="370" r="9" fill="#DD6B20" stroke="white" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="900" y="373" text-anchor="middle" font-size="7" fill="white" font-weight="700">S19</text>
  <text x="890" y="395" text-anchor="start" font-size="9" fill="#1A202C" font-weight="600">Ga Trại Mới</text>
  <text x="890" y="406" text-anchor="start" font-size="7.5" fill="#718096">Mặt đất | Khu dân cư mới</text>

  <!-- S20 Thach Binh -->
  <circle cx="950" cy="380" r="11" fill="#C05621" stroke="#FBD38D" stroke-width="3" filter="url(#shadow)"/>
  <text x="950" y="383" text-anchor="middle" font-size="7" fill="white" font-weight="700">S20</text>
  <text x="920" y="415" text-anchor="start" font-size="9" fill="#1A202C" font-weight="700">Ga Thạch Bình ★</text>
  <text x="920" y="427" text-anchor="start" font-size="7.5" fill="#C05621">Ga cuối | Dự phòng mở rộng</text>
  <text x="920" y="438" text-anchor="start" font-size="7.5" fill="#C05621">↔ ĐS liên vùng Phú Thọ-HN</text>

  <!-- TOD radius indicators around S17, S18 -->
  <!-- S18 TOD rings -->
  <circle cx="850" cy="350" r="24" fill="none" stroke="#F6AD55" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>
  <circle cx="850" cy="350" r="35" fill="none" stroke="#F6AD55" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.3"/>

  <!-- Legend -->
  <rect x="30" y="460" width="940" height="48" rx="4" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="50" y="477" font-size="9" font-weight="600" fill="#2D3748">Chú thích:</text>

  <!-- Legend items -->
  <circle cx="120" cy="484" r="5" fill="#2563EB"/>
  <text x="130" y="488" font-size="8" fill="#4A5568">Ga ngầm (S1-S6)</text>

  <circle cx="240" cy="484" r="4" fill="#38A169"/>
  <text x="249" y="488" font-size="8" fill="#4A5568">Ga mặt đất (vùng đệm)</text>

  <circle cx="380" cy="484" r="6" fill="#DD6B20" stroke="white" stroke-width="1.5"/>
  <text x="390" y="488" font-size="8" fill="#4A5568">Ga tại Hòa Lạc</text>

  <circle cx="490" cy="484" r="6" fill="#C05621" stroke="#FBD38D" stroke-width="2"/>
  <text x="500" y="488" font-size="8" fill="#4A5568">Ga trọng điểm (★)</text>

  <rect x="610" y="479" width="12" height="10" rx="2" fill="#E9D8FD"/>
  <text x="627" y="488" font-size="8" fill="#4A5568">Kết nối tuyến khác</text>

  <circle cx="740" cy="484" r="10" fill="none" stroke="#F6AD55" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="755" y="488" font-size="8" fill="#4A5568">Vùng ảnh hưởng (300-800m)</text>

  <!-- Road labels -->
  <text x="600" y="162" font-size="8" fill="#A0AEC0" transform="rotate(-5, 600, 162)">← Đại lộ Thăng Long →</text>
  <text x="800" y="170" font-size="8" fill="#A0AEC0" transform="rotate(10, 800, 170)">← Cao tốc HL — Hòa Bình →</text>
</svg>