  <text x="630" y="300" text-anchor="start" font-size="9" fill="#1A202C" font-weight="600">Ga Đồng Trúc</text>
  <text x="630" y="312" text-anchor="start" font-size="7.5" fill="#718096">Mặt đất | Phân kỳ đầu tư</text>
