  <!-- S1 Quan Ngua -->
  <circle cx="60" cy="250" r="7" fill="#2563EB" stroke="white" stroke-width="2" filter="url(#shadow)"/>
  <text x="60" y="232" text-anchor="middle" font-size="8" fill="#1A202C" font-weight="600">S1</text>
  <text x="60" y="272" text-anchor="middle" font-size="7.5" fill="#4A5568">Quần Ngựa</text>
  <rect x="32" y="278" width="56" height="14" rx="3" fill="#E9D8FD"/>
  <text x="60" y="288" text-anchor="middle" font-size="7" fill="#553C9A">↔ Tuyến số 2</text>

  <!-- S2 Kim Ma -->
  <circle cx="120" cy="250" r="7" fill="#2563EB" stroke="white" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="232" text-anchor="middle" font-size="8" fill="#1A202C" font-weight="600">S2</text>
  <text x="120" y="272" text-anchor="middle" font-size="7.5" fill="#4A5568">Kim Mã</text>
  <rect x="92" y="278" width="56" height="14" rx="3" fill="#E9D8FD"/>
  <text x="120" y="288" text-anchor="middle" font-size="7" fill="#553C9A">↔ Tuyến số 3</text>

