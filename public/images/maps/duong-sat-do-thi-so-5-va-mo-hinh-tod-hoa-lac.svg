  <!-- S8 -->
  <circle cx="420" cy="250" r="4" fill="#38A169" stroke="white" stroke-width="1"/>

  <!-- S9 -->
  <circle cx="445" cy="250" r="6" fill="#38A169" stroke="white" stroke-width="1.5"/>
  <text x="445" y="237" text-anchor="middle" font-size="7" fill="#276749">S9</text>
  <rect x="422" y="258" width="46" height="14" rx="3" fill="#E9D8FD"/>
  <text x="445" y="268" text-anchor="middle" font-size="7" fill="#553C9A">↔ T.số 6</text>

