  <!-- S4 Vanh dai 2 -->
  <circle cx="215" cy="250" r="5" fill="#2563EB" stroke="white" stroke-width="1.5"/>
  <text x="215" y="237" text-anchor="middle" font-size="7" fill="#718096">S4</text>

  <!-- S5 Hoang Dao Thuy -->
  <circle cx="265" cy="250" r="7" fill="#2563EB" stroke="white" stroke-width="2" filter="url(#shadow)"/>
  <text x="265" y="232" text-anchor="middle" font-size="8" fill="#1A202C" font-weight="600">S5</text>
  <text x="265" y="272" text-anchor="middle" font-size="7.5" fill="#4A5568">H.Đ.Thúy</text>
  <rect x="237" y="278" width="56" height="14" rx="3" fill="#E9D8FD"/>
  <text x="265" y="288" text-anchor="middle" font-size="7" fill="#553C9A">↔ Tuyến số 4</text>

  <!-- S6 Vanh dai 3 -->
  <circle cx="330" cy="250" r="7" fill="#2563EB" stroke="white" stroke-width="2" filter="url(#shadow)"/>
  <text x="330" y="232" text-anchor="middle" font-size="8" fill="#1A202C" font-weight="600">S6</text>
  <text x="330" y="272" text-anchor="middle" font-size="7.5" fill="#4A5568">Vành đai 3</text>
